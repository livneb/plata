<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Plata</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-lg shadow border border-gray-200 dark:border-gray-700 p-6">
      <h1 class="text-2xl font-semibold mb-1">Plata</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Sign in to continue.</p>

      {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-800 text-sm dark:bg-red-900 dark:text-red-200">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4" data-persist="login">
        <input type="hidden" name="next" value="{{ next }}" />
        <div>
          <label class="block text-sm font-medium mb-1" for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="username"
                 class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1" for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
                 class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700" />
        </div>
        <div class="flex items-center">
          <input id="remember" name="remember" type="checkbox" value="1"
                 class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700" />
          <label for="remember" class="ml-2 text-sm">Remember me for 72 hours</label>
        </div>
        <button type="submit"
                class="w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2">
          Sign in
        </button>
      </form>
    </div>
  </div>
</body>
</html>
